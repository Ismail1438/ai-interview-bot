<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Bot</title>

    <style>

        body{
            background:#f0f0f0;
            font-family:Arial;
        }

        .container{
            width:700px;
            margin:auto;
            margin-top:60px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
        }

        input{
            width:75%;
            padding:12px;
            font-size:18px;
        }

        button{
            padding:12px;
            font-size:18px;
            cursor:pointer;
        }

        #response{
            margin-top:20px;
            background:#f5f5f5;
            height:400px;
            overflow-y:auto;
            padding:15px;
            border-radius:5px;
        }

        .user{
            color:blue;
            font-weight:bold;
        }

        .bot{
            color:green;
            font-weight:bold;
        }

        .correct{
            color:green;
        }

        .wrong{
            color:red;
        }

        #exitBtn{
            background:red;
            color:white;
            border:none;
            margin-left:10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Interview Bot</h1>

        <input type="text" id="userInput" placeholder="Type start">

        <button onclick="sendMessage()">Send</button>

        <button id="exitBtn" onclick="exitInterview()">Exit</button>

        <div id="response"></div>

    </div>

<script>

async function sendMessage(){

    let userMessage =
    document.getElementById("userInput").value;

    let response = await fetch("http://127.0.0.1:5000/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            message:userMessage
        })

    });

    let data = await response.json();

    document.getElementById("response").innerHTML +=
    "<p class='user'>You: "
    + userMessage +
    "</p>" +

    "<p class='bot'>Bot: "
    + data.reply +
    "</p><hr>";

    document.getElementById("userInput").value = "";

}

async function exitInterview(){

    let response = await fetch("http://127.0.0.1:5000/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            message:"exit"
        })

    });

    let data = await response.json();

    document.getElementById("response").innerHTML +=

    "<p class='bot'>"
    + data.reply +
    "</p><hr>";

}

</script>

</body>
</html>
